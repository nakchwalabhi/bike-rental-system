<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Vendor Registration | Dehradun Bike Rental</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-50 dark:bg-slate-900 flex items-center justify-center px-4">

  <div class="w-full max-w-md">
    <!-- Logo / Title -->
    <div class="text-center mb-6">
      <h1 class="text-2xl font-bold text-slate-900 dark:text-slate-100">
        Register as Rental Partner
      </h1>
      <p class="mt-2 text-xs text-slate-500 dark:text-slate-400">
        Create your garage account and manage your bikes & scooties in Dehradun.
      </p>
    </div>

    <!-- Card -->
    <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl shadow-sm p-5 space-y-4">

      <!-- Form -->
      <form id="vendorRegisterForm" class="space-y-3 text-sm">

        <!-- Owner Name -->
        <div>
          <label for="ownerName" class="block text-xs font-medium text-slate-600 dark:text-slate-300 mb-1">
            Your Name (Owner)
          </label>
          <input
            id="ownerName"
            type="text"
            placeholder="e.g. Mohit Joshi"
            class="w-full rounded-xl border border-slate-200 dark:border-slate-700 bg-white text-slate-900
                   dark:bg-slate-800 dark:text-slate-100 px-3 py-2 text-xs focus:outline-none
                   focus:ring-2 focus:ring-blue-500"
            required
          />
        </div>

        <!-- Vendor / Garage Name -->
        <div>
          <label for="vendorName" class="block text-xs font-medium text-slate-600 dark:text-slate-300 mb-1">
            Garage / Rental Shop Name
          </label>
          <input
            id="vendorName"
            type="text"
            placeholder="e.g. Himalayan Wheels Garage"
            class="w-full rounded-xl border border-slate-200 dark:border-slate-700 bg-white text-slate-900
                   dark:bg-slate-800 dark:text-slate-100 px-3 py-2 text-xs focus:outline-none
                   focus:ring-2 focus:ring-blue-500"
            required
          />
        </div>

        <!-- Location -->
        <div>
          <label for="location" class="block text-xs font-medium text-slate-600 dark:text-slate-300 mb-1">
            Garage Location (Area / Road)
          </label>
          <input
            id="location"
            type="text"
            placeholder="e.g. Rajpur Road, Prem Nagar, Sahastradhara Road"
            class="w-full rounded-xl border border-slate-200 dark:border-slate-700 bg-white text-slate-900
                   dark:bg-slate-800 dark:text-slate-100 px-3 py-2 text-xs focus:outline-none
                   focus:ring-2 focus:ring-blue-500"
            required
          />
        </div>

        <!-- Contact Number -->
        <div>
          <label for="contact" class="block text-xs font-medium text-slate-600 dark:text-slate-300 mb-1">
            Contact Number
          </label>
          <input
            id="contact"
            type="tel"
            placeholder="e.g. 9876543210"
            class="w-full rounded-xl border border-slate-200 dark:border-slate-700 bg-white text-slate-900
                   dark:bg-slate-800 dark:text-slate-100 px-3 py-2 text-xs focus:outline-none
                   focus:ring-2 focus:ring-blue-500"
            required
          />
        </div>

        <!-- Email -->
        <div>
          <label for="email" class="block text-xs font-medium text-slate-600 dark:text-slate-300 mb-1">
            Email (for login)
          </label>
          <input
            id="email"
            type="email"
            placeholder="e.g. vendor@example.com"
            class="w-full rounded-xl border border-slate-200 dark:border-slate-700 bg-white text-slate-900
                   dark:bg-slate-800 dark:text-slate-100 px-3 py-2 text-xs focus:outline-none
                   focus:ring-2 focus:ring-blue-500"
            required
          />
        </div>

        <!-- Password -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-2">
          <div>
            <label for="password" class="block text-xs font-medium text-slate-600 dark:text-slate-300 mb-1">
              Password
            </label>
            <input
              id="password"
              type="password"
              placeholder="Min 6 characters"
              class="w-full rounded-xl border border-slate-200 dark:border-slate-700 bg-white text-slate-900
                     dark:bg-slate-800 dark:text-slate-100 px-3 py-2 text-xs focus:outline-none
                     focus:ring-2 focus:ring-blue-500"
              required
            />
          </div>
          <div>
            <label for="confirmPassword" class="block text-xs font-medium text-slate-600 dark:text-slate-300 mb-1">
              Confirm Password
            </label>
            <input
              id="confirmPassword"
              type="password"
              placeholder="Re-type password"
              class="w-full rounded-xl border border-slate-200 dark:border-slate-700 bg-white text-slate-900
                     dark:bg-slate-800 dark:text-slate-100 px-3 py-2 text-xs focus:outline-none
                     focus:ring-2 focus:ring-blue-500"
              required
            />
          </div>
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          class="w-full mt-2 bg-blue-600 hover:bg-blue-700 text-white text-xs font-semibold py-2.5 rounded-xl
                 shadow-sm transition"
        >
          Create Vendor Account
        </button>
      </form>

      <!-- Already have an account -->
      <p class="text-[11px] text-center text-slate-500 dark:text-slate-400 mt-3">
        Already registered? 
        <a href="vendor-login.html" class="text-blue-600 hover:underline">Login as Vendor</a>
      </p>
    </div>

    <!-- Back to main site -->
    <div class="text-center mt-4">
      <a href="index.html" class="text-[11px] text-slate-500 hover:underline">
        ← Back to homepage
      </a>
    </div>
  </div>

  <!-- Hook for JS (to call /api/vendor/auth/register later) -->
  <script type="module" src="./assets/js/vendor-register.js"></script>
</body>
</html>
