<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard | Dehradun Bike Rental</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100">
  <header class="border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900">
    <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between text-sm">
      <span class="font-semibold">
        Admin • Garage Owner
      </span>
      <a href="index.html" class="text-xs text-blue-600 hover:underline">
        Back to site
      </a>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-4 py-6 text-sm space-y-4">
    <div class="flex items-center justify-between">
      <h1 class="text-lg font-semibold">Dashboard</h1>
      <button
        id="addVehicleBtn"
        class="px-3 py-1.5 rounded-xl bg-blue-600 text-white text-xs hover:bg-blue-700"
      >
        Add New Vehicle
      </button>
    </div>

    <section class="grid md:grid-cols-3 gap-3 text-xs">
      <div class="rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-3">
        <p class="text-[11px] text-slate-500 dark:text-slate-400">Total Vehicles</p>
        <!-- later we can make this dynamic -->
        <p class="text-xl font-semibold" id="totalVehicles">30</p>
      </div>
      <div class="rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-3">
        <p class="text-[11px] text-slate-500 dark:text-slate-400">Active Bookings</p>
        <p class="text-xl font-semibold">5</p>
      </div>
      <div class="rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-3">
        <p class="text-[11px] text-slate-500 dark:text-slate-400">Today's Pickups</p>
        <p class="text-xl font-semibold">3</p>
      </div>
    </section>

    <section class="rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-3">
      <h2 class="text-sm font-semibold mb-2">Your Vehicles</h2>
      <div class="overflow-x-auto">
        <table class="min-w-full text-[11px]">
          <thead class="text-left text-slate-500 dark:text-slate-400">
            <tr>
              <th class="py-2 pr-3">Name</th>
              <th class="py-2 pr-3">Type</th>
              <th class="py-2 pr-3">Price/hr</th>
              <th class="py-2 pr-3">Price/day</th>
              <th class="py-2 pr-3">Status</th>
              <th class="py-2">Actions</th>
            </tr>
          </thead>
          <tbody
            id="adminVehicleTable"
            class="divide-y divide-slate-100 dark:divide-slate-800"
          >
            <!-- Will be fully rendered from admin-dashboard.js -->
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <!-- SINGLE MODAL FOR ADD / EDIT VEHICLE -->
  <div
    id="vehicleModal"
    class="hidden fixed inset-0 bg-black bg-opacity-30 flex items-center justify-center"
  >
    <div
      class="bg-white dark:bg-slate-900 p-5 rounded-xl w-full max-w-md border border-slate-200 dark:border-slate-800"
    >
      <h2 id="modalTitle" class="text-lg font-semibold mb-3">Add New Vehicle</h2>

      <div class="space-y-3 text-sm">
        <div>
          <label class="text-xs">Vehicle Name</label>
          <input
            id="vName"
            class="w-full p-2 rounded border border-slate-300 dark:border-slate-700
                   dark:bg-slate-800 dark:text-white text-xs"
          />
        </div>

        <div>
          <label class="text-xs">Type</label>
          <select
            id="vType"
            class="w-full p-2 rounded border border-slate-300 dark:border-slate-700
                   dark:bg-slate-800 dark:text-white text-xs"
          >
            <option value="scooty">Scooty</option>
            <option value="bike">Bike</option>
          </select>
        </div>

        <div>
          <label class="text-xs">Price per Hour</label>
          <input
            id="vHour"
            type="number"
            class="w-full p-2 rounded border border-slate-300 dark:border-slate-700
                   dark:bg-slate-800 dark:text-white text-xs"
          />
        </div>

        <div>
          <label class="text-xs">Price per Day</label>
          <input
            id="vDay"
            type="number"
            class="w-full p-2 rounded border border-slate-300 dark:border-slate-700
                   dark:bg-slate-800 dark:text-white text-xs"
          />
        </div>

        <div>
          <label class="text-xs">Status</label>
          <select
            id="vStatus"
            class="w-full p-2 rounded border border-slate-300 dark:border-slate-700
                   dark:bg-slate-800 dark:text-white text-xs"
          >
            <option value="Available">Available</option>
            <option value="Booked">Booked</option>
          </select>
        </div>
      </div>

      <div class="flex justify-end mt-4 space-x-2">
        <button
          id="closeModalBtn"
          class="px-3 py-1.5 text-xs rounded bg-slate-500 text-white"
        >
          Cancel
        </button>
        <button
          id="saveVehicleBtn"
          class="px-3 py-1.5 text-xs rounded bg-blue-600 text-white"
        >
          Save
        </button>
      </div>
    </div>
  </div>

  <!-- Guards + Dashboard JS -->
  <script type="module" src="./assets/js/vendorGuard.js"></script>
  <script type="module" src="./assets/js/admin-dashboard.js"></script>
</body>
</html>
