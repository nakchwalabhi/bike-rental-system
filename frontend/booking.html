<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dehradun Bike Rental | Booking</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: { primary: '#1d4ed8', darkbg: '#020617' }
        }
      }
    }
  </script>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-darkbg dark:text-slate-100 min-h-screen flex flex-col">
  <header class="border-b border-slate-200 dark:border-slate-800 bg-white/70 dark:bg-slate-900/70 backdrop-blur">
    <div class="max-w-xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="index.html" class="text-sm font-semibold">← Back to Home</a>
      <span class="text-xs text-slate-500 dark:text-slate-400">Booking</span>
    </div>
  </header>

  <main class="flex-1 max-w-xl mx-auto px-4 py-6 text-sm">
    <h1 class="text-xl font-semibold mb-4">Confirm your ride</h1>

    <form id="bookingForm" class="space-y-4 rounded-2xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 p-4 shadow-sm">
      <div>
        <label class="block text-xs font-medium mb-1">Selected Vehicle</label>
        <input id="vehicleName" type="text" readonly
               class="w-full text-xs px-3 py-2 rounded-xl border border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-slate-800" />
        <input id="vehicleId" type="hidden" />
      </div>

      <div>
        <label class="block text-xs font-medium mb-1">Garage / Pickup Location</label>
        <select id="garage" class="w-full text-xs px-3 py-2 rounded-xl border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900">
          <option value="">Choose nearby garage</option>
          <option value="Himalayan Wheels Garage">Himalayan Wheels Garage — Rajpur Road</option>
          <option value="Doon Riders Hub">Doon Riders Hub — Prem Nagar</option>
          <option value="Mussoorie Highway Rentals">Mussoorie Highway Rentals — Sahastradhara Road</option>
        </select>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
        <div>
          <label class="block text-xs font-medium mb-1">Pickup Date & Time</label>
          <input id="pickup" type="datetime-local"
                 class="w-full text-xs px-3 py-2 rounded-xl border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900" />
        </div>
        <div>
          <label class="block text-xs font-medium mb-1">Drop-off Date & Time</label>
          <input id="dropoff" type="datetime-local"
                 class="w-full text-xs px-3 py-2 rounded-xl border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900" />
        </div>
      </div>

      <div>
        <label class="block text-xs font-medium mb-1">Driving License (Image / PDF)</label>
        <input type="file" accept="image/*,.pdf"
               class="w-full text-xs px-3 py-2 rounded-xl border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900" />
        <p class="text-[11px] text-slate-500 dark:text-slate-400 mt-1">

        </p>
      </div>

      <div class="grid grid-cols-2 gap-3 text-xs">
        <div class="rounded-2xl bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 p-3">
          <p class="text-[11px] text-slate-500 dark:text-slate-400 mb-1">Duration</p>
          <p id="durationText" class="text-sm font-semibold">0 hrs</p>
        </div>
        <div class="rounded-2xl bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 p-3">
          <p class="text-[11px] text-slate-500 dark:text-slate-400 mb-1">Estimated Price (INR)</p>
          <p id="priceText" class="text-sm font-semibold">₹0</p>
          <p class="text-[10px] text-slate-500 dark:text-slate-400 mt-1">Hourly up to 24 hrs, then daily rate.</p>
        </div>
      </div>

      <div>
        <label class="block text-xs font-medium mb-1">Any notes for the vendor?</label>
        <textarea rows="2"
                  class="w-full text-xs px-3 py-2 rounded-xl border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900"
                  placeholder="Helmet size, extra pillion, luggage rack, etc."></textarea>
      </div>

      <button type="submit"
              class="w-full mt-2 inline-flex items-center justify-center gap-2 px-4 py-2 rounded-xl bg-primary text-white text-xs font-medium hover:bg-primary/90">
        Confirm Booking 
      </button>

      <p class="text-[11px] text-slate-500 dark:text-slate-400 text-center">
        
      </p>
    </form>
  </main>

  <!-- <script type="module" src="./assets/js/vehicle.js"></script> -->

  <script type="module" src="./assets/js/booking.js"></script>
<script type="module" src="./assets/js/authGuard.js"></script>

</body>
</html>
