<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dehradun Bike Rental | Register</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex items-center justify-center bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100">
  <div class="w-full max-w-sm mx-auto px-4">
    <div class="mb-4 text-center">
      <h1 class="text-xl font-semibold">Create account</h1>
      <p class="text-xs text-slate-500 dark:text-slate-400">Sign up as a rider. Vendor signup can be separate.</p>
    </div>

    <form id="registerForm" class="rounded-2xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 p-4 space-y-3 text-sm">
      <div>
        <label class="block text-xs font-medium mb-1">Full Name</label>
        <input id="fullname" type="text" class="w-full text-xs px-3 py-2 rounded-xl border border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-slate-800" />
      </div>
      <div>
        <label class="block text-xs font-medium mb-1">Email</label>
        <input id="email" type="email" class="w-full text-xs px-3 py-2 rounded-xl border border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-slate-800" />
      </div>
      <div>
        <label class="block text-xs font-medium mb-1">Password</label>
        <input id="password" type="password" class="w-full text-xs px-3 py-2 rounded-xl border border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-slate-800" />
      </div>
      <button type="submit" class="w-full inline-flex items-center justify-center px-3 py-2 rounded-xl bg-blue-600 text-white text-xs font-medium hover:bg-blue-700">
        Register
      </button>
      <p class="text-[11px] text-center text-slate-500 dark:text-slate-400">
        Already have an account? <a href="login.html" class="text-blue-600 hover:underline">Login</a>
      </p>
    </form>
  </div>
  <script type="module" src="./assets/js/register.js"></script>
  <script type="module" src="./assets/js/preventAuthPages.js"></script>

</body>
</html>
