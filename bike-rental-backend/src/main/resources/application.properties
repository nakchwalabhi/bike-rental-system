spring.application.name=Bike Rental Backend
server.port=8080

# H2 in-memory database (for demo/dev)
spring.datasource.url=jdbc:h2:mem:bikerental;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=true

# Razorpay test keys (replace with real keys in production)
razorpay.key.id=rzp_test_placeholder
razorpay.key.secret=placeholder_secret

# CORS
cors.allowed-origins=http://localhost:5173
